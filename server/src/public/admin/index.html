<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corp Chat — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--danger:#dc2626;--danger-dark:#b91c1c;--success:#16a34a;--sidebar-bg:#0f172a;--sidebar-hover:#1e293b;--sidebar-active:#2563eb;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;width:100%;background:linear-gradient(135deg,#0f172a,#1e3a5f)}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.login-card h1{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px}
.login-card p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-dark)}
.btn-ghost{background:none;color:var(--muted);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%;justify-content:center}
.err{color:var(--danger);font-size:13px;margin-top:8px}
/* LAYOUT */
#app{display:none;width:100%;height:100vh}
.sidebar{width:240px;min-width:240px;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh}
.sidebar-logo{padding:20px 20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1e293b}
.sidebar-logo .icon{width:36px;height:36px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-logo .name{color:#f1f5f9;font-weight:700;font-size:15px}
.sidebar-logo .sub{color:#64748b;font-size:11px}
nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{padding:8px 16px 4px;font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--sidebar-hover);color:#f1f5f9}
.nav-item.active{background:rgba(37,99,235,.15);color:#60a5fa;border-left-color:#2563eb}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:16px;border-top:1px solid #1e293b}
.sidebar-user{display:flex;align-items:center;gap:10px}
.sidebar-user .av{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.sidebar-user .info{flex:1;overflow:hidden}
.sidebar-user .uname{color:#f1f5f9;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-user .role{color:#64748b;font-size:11px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:18px;font-weight:700}
.topbar .actions{display:flex;gap:8px;align-items:center}
.page-body{flex:1;overflow-y:auto;padding:24px 28px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px 24px;border:1px solid var(--border);display:flex;align-items:center;gap:16px}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-icon.blue{background:#dbeafe}.stat-icon.green{background:#dcfce7}.stat-icon.purple{background:#f3e8ff}.stat-icon.orange{background:#ffedd5}
.stat-val{font-size:28px;font-weight:800;line-height:1}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:3px}
/* TABLE */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:15px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#dcfce7;color:#15803d}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-red{background:#fee2e2;color:#b91c1c}
.td-actions{display:flex;gap:6px;align-items:center}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:460px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.members-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto}
.member-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border)}
.member-row .av{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.member-row .info{flex:1}
.member-row .mname{font-size:13px;font-weight:600}
.member-row .muname{font-size:11px;color:var(--muted)}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1.5px solid transparent}
.checkbox-row:hover{background:var(--bg)}
.checkbox-row.selected{border-color:var(--primary);background:#eff6ff}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#f1f5f9;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:slideIn .3s ease;max-width:320px}
.toast.success{background:#15803d}
.toast.error{background:#b91c1c}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;width:240px}
.search-bar input{border:none;background:none;outline:none;font-size:13px;width:100%}
/* empty */
.empty-row td{text-align:center;color:var(--muted);padding:32px;font-size:13px}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-logo">💬</div>
    <h1>Corp Chat</h1>
    <p>Панель администратора</p>
    <div class="form-group"><label>Логин</label><input id="l-user" value="admin" autocomplete="username"></div>
    <div class="form-group"><label>Пароль</label><input id="l-pass" type="password" autocomplete="current-password"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Войти</button>
    <div class="err" id="l-err"></div>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">💬</div>
      <div><div class="name">Corp Chat</div><div class="sub">Admin Panel</div></div>
    </div>
    <nav>
      <div class="nav-section">Обзор</div>
      <div class="nav-item active" onclick="nav('dashboard')" data-page="dashboard">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Главная
      </div>
      <div class="nav-section">Управление</div>
      <div class="nav-item" onclick="nav('users')" data-page="users">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
        Пользователи
      </div>
      <div class="nav-item" onclick="nav('rooms')" data-page="rooms">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Комнаты
      </div>
      <div class="nav-item" onclick="nav('chats')" data-page="chats">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Личные чаты и группы
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="av" id="nav-av">A</div>
        <div class="info">
          <div class="uname" id="nav-name">Admin</div>
          <div class="role">Администратор</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="logout()" title="Выйти">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="topbar">
      <h2 id="page-title">Главная</h2>
      <div class="actions" id="topbar-actions"></div>
    </div>
    <div class="page-body" id="page-body"></div>
  </div>
</div>

<!-- User modal -->
<div class="modal-bg" id="modal-user">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title">Создать пользователя</h3>
      <button class="modal-close" onclick="closeModal('modal-user')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Логин</label><input id="u-username" placeholder="username"></div>
      <div class="form-group"><label>Отображаемое имя</label><input id="u-display" placeholder="Иван Иванов"></div>
      <div class="form-group"><label>Пароль <span id="u-pass-hint" style="color:var(--muted);font-weight:400">(оставьте пустым, чтобы не менять)</span></label><input id="u-password" type="password" placeholder="••••••••"></div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:14px;cursor:pointer">
          <input type="checkbox" id="u-admin" style="width:16px;height:16px;accent-color:var(--primary)">
          Права администратора
        </label>
      </div>
      <div class="err" id="u-err"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-user')">Отмена</button>
      <button class="btn btn-primary" id="u-save-btn" onclick="saveUser()">Создать</button>
    </div>
  </div>
</div>

<!-- Change password modal -->
<div class="modal-bg" id="modal-password">
  <div class="modal">
    <div class="modal-header">
      <h3>Сменить пароль</h3>
      <button class="modal-close" onclick="closeModal('modal-password')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Новый пароль</label><input id="cp-pass" type="password" placeholder="••••••••"></div>
      <div class="err" id="cp-err"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-password')">Отмена</button>
      <button class="btn btn-primary" onclick="savePassword()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Members modal -->
<div class="modal-bg" id="modal-members">
  <div class="modal">
    <div class="modal-header">
      <h3 id="members-title">Участники</h3>
      <button class="modal-close" onclick="closeModal('modal-members')">✕</button>
    </div>
    <div class="modal-body">
      <div class="members-list" id="members-list"></div>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
        <p style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Добавить участников</p>
        <div class="members-list" id="add-members-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-members')">Закрыть</button>
      <button class="btn btn-primary" onclick="addSelectedMembers()">Добавить выбранных</button>
    </div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-bg" id="modal-confirm">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <h3 id="confirm-title">Подтверждение</h3>
      <button class="modal-close" onclick="closeModal('modal-confirm')">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirm-text" style="color:var(--muted);font-size:14px;line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm')">Отмена</button>
      <button class="btn btn-danger" id="confirm-ok">Подтвердить</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
let token = null, currentUser = null;
let editingUserId = null, membersForChatId = null;

const api = async (method, path, body) => {
  const res = await fetch(path, { method, headers: {'Content-Type':'application/json', ...(token?{Authorization:'Bearer '+token}:{})}, body: body ? JSON.stringify(body) : undefined });
  return res.json();
};

function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

document.getElementById('l-pass').addEventListener('keydown', e => e.key === 'Enter' && doLogin());

async function doLogin() {
  const data = await api('POST', '/api/auth/login', {username: document.getElementById('l-user').value, password: document.getElementById('l-pass').value});
  if (data.token) {
    if (!data.user.is_admin) { document.getElementById('l-err').textContent = 'Нет прав администратора'; return; }
    token = data.token; currentUser = data.user;
    document.getElementById('nav-name').textContent = data.user.display_name;
    document.getElementById('nav-av').textContent = initials(data.user.display_name);
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    nav('dashboard');
  } else { document.getElementById('l-err').textContent = data.error || 'Ошибка входа'; }
}

function logout() { token = null; location.reload(); }

const pages = { dashboard: renderDashboard, users: renderUsers, rooms: renderRooms, chats: renderChats };
const pageTitles = { dashboard: 'Главная', users: 'Пользователи', rooms: 'Комнаты', chats: 'Личные чаты и группы' };

function nav(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('page-title').textContent = pageTitles[page];
  pages[page]();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function confirm(title, text, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-text').textContent = text;
  document.getElementById('confirm-ok').onclick = () => { closeModal('modal-confirm'); onOk(); };
  openModal('modal-confirm');
}

// DASHBOARD
async function renderDashboard() {
  document.getElementById('topbar-actions').innerHTML = '';
  const s = await api('GET', '/api/admin/stats');
  document.getElementById('page-body').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon blue">👤</div><div><div class="stat-val">${s.users}</div><div class="stat-lbl">Пользователей</div></div></div>
      <div class="stat-card"><div class="stat-icon green">🏠</div><div><div class="stat-val">${s.rooms}</div><div class="stat-lbl">Комнат</div></div></div>
      <div class="stat-card"><div class="stat-icon purple">👥</div><div><div class="stat-val">${s.groups}</div><div class="stat-lbl">Групп</div></div></div>
      <div class="stat-card"><div class="stat-icon blue">💬</div><div><div class="stat-val">${s.chats}</div><div class="stat-lbl">Личных чатов</div></div></div>
      <div class="stat-card"><div class="stat-icon orange">✉️</div><div><div class="stat-val">${s.messages}</div><div class="stat-lbl">Сообщений</div></div></div>
    </div>`;
}

// ROOMS
let allRooms = [], allUsersCache = [];
async function renderRooms() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary btn-sm" onclick="openCreateRoom()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Создать комнату</button>`;
  [allRooms, allUsersCache] = await Promise.all([api('GET','/api/admin/chats'), api('GET','/api/admin/users')]);
  allRooms = allRooms.filter(c => c.type === 'room');
  renderRoomsTable();
}

function renderRoomsTable() {
  const rows = allRooms.length ? allRooms.map(r => `
    <tr>
      <td style="font-weight:600;color:var(--muted);font-size:12px">#${r.id}</td>
      <td style="font-weight:700">${esc(r.name||'—')}</td>
      <td>${r.member_count}</td>
      <td>${r.message_count}</td>
      <td style="color:var(--muted)">${fmtDate(r.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openRoomMembers(${r.id},'${esc(r.name||'')}')">Участники</button>
        <button class="btn btn-ghost btn-sm" onclick="clearHistory(${r.id})">Очистить историю</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRoom(${r.id})">Удалить</button>
      </div></td>
    </tr>`).join('') : '<tr class="empty-row"><td colspan="6">Комнат нет. Создайте первую!</td></tr>';
  document.getElementById('page-body').innerHTML = `
    <div class="card">
      <div class="card-header"><h3>Комнаты (${allRooms.length})</h3></div>
      <table><thead><tr><th>ID</th><th>Название</th><th>Участников</th><th>Сообщений</th><th>Создана</th><th>Действия</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}

// Create room modal state
let createRoomSelectedIds = new Set();
function openCreateRoom() {
  createRoomSelectedIds = new Set();
  const usersHtml = allUsersCache.map(u => `
    <div class="checkbox-row" onclick="toggleRoomUser(this,${u.id})">
      <input type="checkbox" onclick="event.stopPropagation();toggleRoomUser(this.parentElement,${u.id})">
      <div class="av" style="width:28px;height:28px;font-size:11px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">${initials(u.display_name)}</div>
      <div><div style="font-size:13px;font-weight:600">${esc(u.display_name)}</div><div style="font-size:11px;color:var(--muted)">@${esc(u.username)}</div></div>
    </div>`).join('');
  document.getElementById('members-title').textContent = 'Создать комнату';
  document.getElementById('members-list').innerHTML = `
    <div class="form-group" style="margin-bottom:12px"><label>Название комнаты</label><input id="room-name-input" placeholder="Например: Общий, Разработка…"></div>`;
  document.getElementById('add-members-list').innerHTML = usersHtml;
  document.getElementById('confirm-ok').style.display = 'none';
  // Reuse members modal with custom footer
  document.querySelector('#modal-members .modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modal-members')">Отмена</button>
    <button class="btn btn-primary" onclick="submitCreateRoom()">Создать комнату</button>`;
  openModal('modal-members');
}

function toggleRoomUser(el, id) {
  el.classList.toggle('selected');
  el.querySelector('input').checked = el.classList.contains('selected');
  createRoomSelectedIds.has(id) ? createRoomSelectedIds.delete(id) : createRoomSelectedIds.add(id);
}

async function submitCreateRoom() {
  const name = document.getElementById('room-name-input')?.value.trim();
  if (!name) { toast('Введите название комнаты', 'error'); return; }
  const data = await api('POST', '/api/admin/rooms', { name, member_ids: [...createRoomSelectedIds] });
  if (data?.id) { closeModal('modal-members'); toast('Комната создана', 'success'); renderRooms(); }
  else toast(data?.error || 'Ошибка', 'error');
}

async function openRoomMembers(chatId, name) {
  membersForChatId = chatId;
  selectedAddMembers = new Set();
  document.getElementById('members-title').textContent = `Участники: ${name}`;
  const [members, allU] = await Promise.all([api('GET', '/api/admin/chats/' + chatId + '/members'), api('GET', '/api/admin/users')]);
  const memberIds = new Set(members.map(m => m.id));
  document.getElementById('members-list').innerHTML = members.map(m => `
    <div class="member-row">
      <div class="av">${initials(m.display_name)}</div>
      <div class="info"><div class="mname">${esc(m.display_name)}</div><div class="muname">@${esc(m.username)}</div></div>
      <button class="btn btn-danger btn-sm" onclick="removeMember(${chatId},${m.id},this)">Удалить</button>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Нет участников</p>';
  document.getElementById('add-members-list').innerHTML = allU.filter(u => !memberIds.has(u.id)).map(u => `
    <div class="checkbox-row" onclick="toggleAddMember(this,${u.id})">
      <input type="checkbox" onclick="event.stopPropagation();toggleAddMember(this.parentElement,${u.id})">
      <div class="av" style="width:28px;height:28px;font-size:11px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">${initials(u.display_name)}</div>
      <div><div style="font-size:13px;font-weight:600">${esc(u.display_name)}</div><div style="font-size:11px;color:var(--muted)">@${esc(u.username)}</div></div>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Все пользователи уже в комнате</p>';
  document.querySelector('#modal-members .modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modal-members')">Закрыть</button>
    <button class="btn btn-primary" onclick="addSelectedMembers()">Добавить выбранных</button>`;
  openModal('modal-members');
}

function deleteRoom(id) {
  confirm('Удалить комнату?', `Комната #${id} и все сообщения будут удалены безвозвратно.`, async () => {
    await api('DELETE', '/api/chats/admin/' + id);
    toast('Комната удалена');
    renderRooms();
  });
}

// USERS
let allUsers = [];
async function renderUsers() {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary btn-sm" onclick="openCreateUser()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Создать пользователя</button>`;
  allUsers = await api('GET', '/api/admin/users');
  renderUsersTable(allUsers);
}

function renderUsersTable(users) {
  const rows = users.length ? users.map(u => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div class="av" style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${initials(u.display_name)}</div><div><div style="font-weight:600">${esc(u.display_name)}</div><div style="font-size:11px;color:var(--muted)">@${esc(u.username)}</div></div></div></td>
      <td>${u.is_admin ? '<span class="badge badge-blue">Администратор</span>' : '<span class="badge badge-gray">Пользователь</span>'}</td>
      <td style="color:var(--muted)">${fmtDate(u.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditUser(${u.id})">Изменить</button>
        <button class="btn btn-ghost btn-sm" onclick="openChangePass(${u.id})">Пароль</button>
        <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${esc(u.display_name)}')">Удалить</button>
      </div></td>
    </tr>`).join('') : '<tr class="empty-row"><td colspan="4">Пользователи не найдены</td></tr>';
  document.getElementById('page-body').innerHTML = `
    <div class="card">
      <div class="card-header"><h3>Все пользователи (${users.length})</h3>
        <div class="search-bar"><svg width="14" height="14" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Поиск..." oninput="filterUsers(this.value)"></div>
      </div>
      <table><thead><tr><th>Пользователь</th><th>Роль</th><th>Создан</th><th>Действия</th></tr></thead><tbody id="users-tbody">${rows}</tbody></table>
    </div>`;
}

function filterUsers(q) {
  const f = allUsers.filter(u => u.display_name.toLowerCase().includes(q.toLowerCase()) || u.username.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('users-tbody').innerHTML = f.map(u => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${initials(u.display_name)}</div><div><div style="font-weight:600">${esc(u.display_name)}</div><div style="font-size:11px;color:var(--muted)">@${esc(u.username)}</div></div></div></td>
      <td>${u.is_admin ? '<span class="badge badge-blue">Администратор</span>' : '<span class="badge badge-gray">Пользователь</span>'}</td>
      <td style="color:var(--muted)">${fmtDate(u.created_at)}</td>
      <td><div class="td-actions"><button class="btn btn-ghost btn-sm" onclick="openEditUser(${u.id})">Изменить</button><button class="btn btn-ghost btn-sm" onclick="openChangePass(${u.id})">Пароль</button><button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${esc(u.display_name)}')">Удалить</button></div></td>
    </tr>`).join('') || '<tr class="empty-row"><td colspan="4">Ничего не найдено</td></tr>';
}

function openCreateUser() {
  editingUserId = null;
  document.getElementById('user-modal-title').textContent = 'Создать пользователя';
  document.getElementById('u-save-btn').textContent = 'Создать';
  document.getElementById('u-pass-hint').style.display = 'none';
  ['u-username','u-display','u-password'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('u-admin').checked = false;
  document.getElementById('u-err').textContent = '';
  openModal('modal-user');
}

function openEditUser(id) {
  const u = allUsers.find(x => x.id === id);
  editingUserId = id;
  document.getElementById('user-modal-title').textContent = 'Изменить пользователя';
  document.getElementById('u-save-btn').textContent = 'Сохранить';
  document.getElementById('u-pass-hint').style.display = '';
  document.getElementById('u-username').value = u.username;
  document.getElementById('u-display').value = u.display_name;
  document.getElementById('u-password').value = '';
  document.getElementById('u-admin').checked = !!u.is_admin;
  document.getElementById('u-err').textContent = '';
  openModal('modal-user');
}

async function saveUser() {
  const username = document.getElementById('u-username').value.trim();
  const display_name = document.getElementById('u-display').value.trim();
  const password = document.getElementById('u-password').value;
  const is_admin = document.getElementById('u-admin').checked;
  document.getElementById('u-err').textContent = '';

  if (editingUserId) {
    const body = { username, display_name, is_admin };
    const data = await api('PATCH', '/api/users/' + editingUserId, body);
    if (password) await api('PATCH', '/api/users/' + editingUserId + '/password', { password });
    if (data.ok) { closeModal('modal-user'); toast('Пользователь обновлён', 'success'); renderUsers(); }
    else document.getElementById('u-err').textContent = data.error || 'Ошибка';
  } else {
    if (!username || !display_name || !password) { document.getElementById('u-err').textContent = 'Заполните все поля'; return; }
    const data = await api('POST', '/api/users', { username, display_name, password, is_admin });
    if (data.id) { closeModal('modal-user'); toast('Пользователь создан', 'success'); renderUsers(); }
    else document.getElementById('u-err').textContent = data.error || 'Ошибка';
  }
}

let changingPassId = null;
function openChangePass(id) { changingPassId = id; document.getElementById('cp-pass').value = ''; document.getElementById('cp-err').textContent = ''; openModal('modal-password'); }
async function savePassword() {
  const password = document.getElementById('cp-pass').value;
  if (!password) { document.getElementById('cp-err').textContent = 'Введите пароль'; return; }
  const data = await api('PATCH', '/api/users/' + changingPassId + '/password', { password });
  if (data.ok) { closeModal('modal-password'); toast('Пароль изменён', 'success'); }
  else document.getElementById('cp-err').textContent = data.error || 'Ошибка';
}

function deleteUser(id, name) {
  confirm('Удалить пользователя?', `«${name}» будет удалён. Это действие необратимо.`, async () => {
    await api('DELETE', '/api/users/' + id);
    toast('Пользователь удалён');
    renderUsers();
  });
}

// CHATS
let allChats = [];
async function renderChats() {
  document.getElementById('topbar-actions').innerHTML = '';
  allChats = await api('GET', '/api/admin/chats');
  renderChatsTable(allChats);
}

function renderChatsTable(chats) {
  const rows = chats.length ? chats.map(c => `
    <tr>
      <td style="font-weight:600;color:var(--muted);font-size:12px">#${c.id}</td>
      <td>${c.type === 'group' ? '<span class="badge badge-green">Комната</span>' : '<span class="badge badge-gray">Личный</span>'}</td>
      <td style="font-weight:600">${esc(c.name || (c.type === 'direct' ? 'Личный чат' : '—'))}</td>
      <td>${c.member_count}</td>
      <td>${c.message_count}</td>
      <td style="color:var(--muted)">${fmtDate(c.created_at)}</td>
      <td><div class="td-actions">
        ${c.type !== 'direct' ? `<button class="btn btn-ghost btn-sm" onclick="openMembers(${c.id},'${esc(c.name||'')}')">Участники</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="clearHistory(${c.id})">Очистить историю</button>
        <button class="btn btn-danger btn-sm" onclick="deleteChat(${c.id})">Удалить</button>
      </div></td>
    </tr>`).join('') : '<tr class="empty-row"><td colspan="7">Чатов нет</td></tr>';
  document.getElementById('page-body').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-ghost btn-sm ${chatFilter===''?'btn-primary':''}" onclick="setChatFilter('')">Все</button>
      <button class="btn btn-ghost btn-sm ${chatFilter==='group'?'btn-primary':''}" onclick="setChatFilter('group')">Комнаты</button>
      <button class="btn btn-ghost btn-sm ${chatFilter==='direct'?'btn-primary':''}" onclick="setChatFilter('direct')">Личные</button>
    </div>
    <div class="card">
      <div class="card-header"><h3>Чаты и комнаты (${chats.length})</h3>
        <div class="search-bar"><svg width="14" height="14" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Поиск..." oninput="filterChats(this.value)"></div>
      </div>
      <table><thead><tr><th>ID</th><th>Тип</th><th>Название</th><th>Участников</th><th>Сообщений</th><th>Создан</th><th>Действия</th></tr></thead><tbody id="chats-tbody">${rows}</tbody></table>
    </div>`;
}

let chatFilter = '';
function setChatFilter(f) { chatFilter = f; const filtered = f ? allChats.filter(c => c.type === f) : allChats; renderChatsTable(filtered); }
function filterChats(q) {
  const filtered = allChats.filter(c => (chatFilter ? c.type === chatFilter : true) && (c.name||'').toLowerCase().includes(q.toLowerCase()));
  document.getElementById('chats-tbody').innerHTML = filtered.map(c => `<tr><td style="font-weight:600;color:var(--muted);font-size:12px">#${c.id}</td><td>${c.type==='group'?'<span class="badge badge-green">Комната</span>':'<span class="badge badge-gray">Личный</span>'}</td><td style="font-weight:600">${esc(c.name||(c.type==='direct'?'Личный чат':'—'))}</td><td>${c.member_count}</td><td>${c.message_count}</td><td style="color:var(--muted)">${fmtDate(c.created_at)}</td><td><div class="td-actions">${c.type==='group'?`<button class="btn btn-ghost btn-sm" onclick="openMembers(${c.id},'${esc(c.name||'')}')">Участники</button>`:''}<button class="btn btn-ghost btn-sm" onclick="clearHistory(${c.id})">Очистить историю</button><button class="btn btn-danger btn-sm" onclick="deleteChat(${c.id})">Удалить</button></div></td></tr>`).join('') || '<tr class="empty-row"><td colspan="7">Ничего не найдено</td></tr>';
}

function clearHistory(id) {
  confirm('Очистить историю?', `Все сообщения чата #${id} будут удалены безвозвратно.`, async () => {
    await api('DELETE', '/api/chats/admin/' + id + '/messages');
    toast('История очищена', 'success');
    renderChats();
  });
}

function deleteChat(id) {
  confirm('Удалить чат?', `Чат #${id} и все его сообщения будут удалены безвозвратно.`, async () => {
    await api('DELETE', '/api/chats/admin/' + id);
    toast('Чат удалён');
    renderChats();
  });
}

// MEMBERS
let selectedAddMembers = new Set();
async function openMembers(chatId, name) {
  membersForChatId = chatId;
  selectedAddMembers = new Set();
  document.getElementById('members-title').textContent = `Участники: ${name}`;
  document.querySelector('#modal-members .modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal('modal-members')">Закрыть</button>
    <button class="btn btn-primary" onclick="addSelectedMembers()">Добавить выбранных</button>`;
  const [members, allU] = await Promise.all([api('GET', '/api/admin/chats/' + chatId + '/members'), api('GET', '/api/admin/users')]);
  const memberIds = new Set(members.map(m => m.id));

  document.getElementById('members-list').innerHTML = members.map(m => `
    <div class="member-row">
      <div class="av">${initials(m.display_name)}</div>
      <div class="info"><div class="mname">${esc(m.display_name)}</div><div class="muname">@${esc(m.username)}</div></div>
      <button class="btn btn-danger btn-sm" onclick="removeMember(${chatId},${m.id},this)">Удалить</button>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Нет участников</p>';

  document.getElementById('add-members-list').innerHTML = allU.filter(u => !memberIds.has(u.id)).map(u => `
    <div class="checkbox-row" onclick="toggleAddMember(this,${u.id})">
      <input type="checkbox" onclick="event.stopPropagation();toggleAddMember(this.parentElement,${u.id})">
      <div class="av" style="width:28px;height:28px;font-size:11px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">${initials(u.display_name)}</div>
      <div><div style="font-size:13px;font-weight:600">${esc(u.display_name)}</div><div style="font-size:11px;color:var(--muted)">@${esc(u.username)}</div></div>
    </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Все пользователи уже в чате</p>';

  openModal('modal-members');
}

function toggleAddMember(el, id) {
  el.classList.toggle('selected');
  el.querySelector('input').checked = el.classList.contains('selected');
  selectedAddMembers.has(id) ? selectedAddMembers.delete(id) : selectedAddMembers.add(id);
}

async function removeMember(chatId, userId, btn) {
  btn.disabled = true;
  await api('DELETE', `/api/chats/${chatId}/members/${userId}`);
  btn.closest('.member-row').remove();
  toast('Участник удалён');
}

async function addSelectedMembers() {
  if (!selectedAddMembers.size) { toast('Выберите пользователей'); return; }
  await Promise.all([...selectedAddMembers].map(uid => api('POST', `/api/chats/${membersForChatId}/members`, { user_id: uid })));
  toast('Участники добавлены', 'success');
  closeModal('modal-members');
}

function initials(name) { return (name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) { return new Date(ts*1000).toLocaleDateString('ru',{day:'2-digit',month:'2-digit',year:'numeric'}); }
</script>
