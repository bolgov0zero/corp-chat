name: Build Client
run-name: "Сборка и публикация ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'c*'
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            cmd: build:mac
            artifact: "client/dist/*.dmg"
          - os: windows-latest
            name: Windows
            cmd: build:win
            artifact: "client/dist/*.exe"
          - os: ubuntu-latest
            name: Linux
            cmd: build:linux
            artifact: "client/dist/*.AppImage"
          - os: ubuntu-latest
            name: Linux-ARM
            cmd: build:linux-arm
            artifact: "client/dist/*.AppImage"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build
        working-directory: client
        run: npm run ${{ matrix.cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    name: Создать релиз
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/c') || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Получить описание релиза
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            body=$(cat RELEASE_NOTES.md)
          else
            body=$(git log -1 --pretty=%B)
          fi
          {
            echo 'body<<ENDBODY'
            echo "$body"
            echo ENDBODY
          } >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
          draft: false
          prerelease: false
