name: Build Client
run-name: "Сборка и публикация ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'c*'
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            cmd: build:mac
            artifact: "client/dist/*.dmg"
          - os: windows-latest
            name: Windows
            cmd: build:win
            artifact: "client/dist/*.exe"
          - os: ubuntu-latest
            name: Linux
            cmd: build:linux
            artifact: "client/dist/*.AppImage"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build
        working-directory: client
        run: npm run ${{ matrix.cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Copy app icon
        run: cp icons/app/icon-1024.png ios/Assets.xcassets/AppIcon.appiconset/

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build
        working-directory: ios
        run: |
          xcodebuild \
            -scheme Electron \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA
        working-directory: ios
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -1)
          mkdir Payload
          cp -r "$APP" Payload/
          zip -r Electron.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS
          path: ios/Electron.ipa

  release:
    name: Создать релиз
    needs: [build, build-ios]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success' && (startsWith(github.ref, 'refs/tags/c') || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Получить описание релиза
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            body=$(cat RELEASE_NOTES.md)
          else
            body=$(git log -1 --pretty=%B)
          fi
          {
            echo 'body<<ENDBODY'
            echo "$body"
            echo ENDBODY
          } >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
          draft: false
          prerelease: false
