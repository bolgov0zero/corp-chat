name: Build Client

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            cmd: build:mac
            artifact: "client/dist/*.dmg"
          - os: windows-latest
            name: Windows
            cmd: build:win
            artifact: "client/dist/*.exe"
          - os: ubuntu-latest
            name: Linux
            cmd: build:linux
            artifact: "client/dist/*{x86_64.AppImage,amd64.deb}"
          - os: ubuntu-latest
            name: Linux-ARM
            cmd: build:linux-arm
            artifact: "client/dist/*{arm64.AppImage,arm64.deb}"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install fpm (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm --no-document

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build
        working-directory: client
        run: npm run ${{ matrix.cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-${{ matrix.name }}
          path: ${{ matrix.artifact }}
